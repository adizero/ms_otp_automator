<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <h1>MS OTP Automator</h1>
  <label for="command">oathtool command:</label>
  <input type="text" id="command" placeholder="oathtool --totp -b YOUR_SECRET">
  <div class="option">
    <label><input type="checkbox" id="skipMfa" checked> Skip MFA registration prompt</label>
  </div>
  <div class="option">
    <label><input type="checkbox" id="autoPassword" checked> Auto-fill password</label>
  </div>
  <div class="sub-option" id="passwordGroup">
    <label for="password">Password (empty = use prefilled):</label>
    <input type="password" id="password" placeholder="Leave empty if using Chrome passwords">
  </div>
  <div class="option">
    <label><input type="checkbox" id="autoSelect" checked> Auto-select account</label>
  </div>
  <div class="sub-option" id="accountNameGroup">
    <label for="accountName">Account name (regex/substring, empty = first):</label>
    <input type="text" id="accountName" placeholder="user@example.com">
  </div>
  <div class="buttons">
    <button id="save">Save</button>
    <button id="test">Test</button>
  </div>
  <div id="status"></div>
  <div class="ext-id">Extension ID: <code id="extId"></code></div>
  <script src="popup.js"></script>
</body>
</html>
